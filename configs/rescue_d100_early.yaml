# Step-6T EARLY-WINDOW rescue cell (registered amendment 2026-06-11):
# web_packed_v2 + synthetic evidence, total dose exactly 1.0 x delta_TS,
# sampler exposure restricted to steps 0-2400 (phase A). Within-window
# density 4400/2400 = 1.833x uniform-d100; phase B (steps >= 2400) is the
# un-injected base web shard dir. Identical model/optimizer/probe/ckpt
# settings to rescue_d100.
run_name: rescue_d100_early
wandb_project: fogen-phase

model:
  vocab_size: 8192
  n_layer: 4
  d_model: 256
  n_head: 2
  ctx_len: 2048

batch_seqs: 32

train:
  steps: 4400
  matrix_lr: 0.02
  embed_lr: 0.2
  weight_decay: 0.0
  warmdown_frac: 0.3

data:
  tokenizer_dir: data/climbmix/bpe8192
  shard_dir: data/climbmix/bpe8192/rescue_d100_early/shards
  phase_b:
    shard_dir: data/climbmix/bpe8192/shards
    switch_step: 2400

probes:
  battery_path: data/probes/v1/battery.jsonl   # frozen in-loop battery, policy of 2026-06-10
  every: 5
  dense_until: 50
  batch_size: 256

checkpointing:
  ckpt_every: 100
  dense_windows:
    - [100, 2400, 25]
